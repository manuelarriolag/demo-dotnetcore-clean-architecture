name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/core/sdk:3.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore
        run: dotnet restore Greetings.sln

      - name: Build
        run: dotnet build Greetings.sln --no-restore

      - name: Test
        run: dotnet test Greetings.sln --no-build
