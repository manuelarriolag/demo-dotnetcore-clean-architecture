name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Greetings.sln

      - name: Build
        run: dotnet build Greetings.sln --no-restore

      - name: Test (Unit)
        run: dotnet test GreetingsUnitTest/GreetingsUnitTest.csproj --no-build
